  <script>
    var MIN_TS = 1618444800000;
    var MAX_TS = 1780601716490;
    var SPAN = 162156916490;
    var gd = document.querySelector('.plotly-graph-div');
    var startSlider = document.getElementById('range-start');
    var endSlider = document.getElementById('range-end');
    var startLabel = document.getElementById('range-start-label');
    var endLabel = document.getElementById('range-end-label');
    var fill = document.getElementById('slider-fill');

    function fmtDate(ts) {
      var d = new Date(ts);
      return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    }

    function updateRange() {
      var s = parseInt(startSlider.value);
      var e = parseInt(endSlider.value);
      if (s > e) { return; }
      var startTs = MIN_TS + (s / 1000) * SPAN;
      var endTs = MIN_TS + (e / 1000) * SPAN;
      startLabel.textContent = fmtDate(startTs);
      endLabel.textContent = fmtDate(endTs);
      fill.style.left = (s / 10) + '%';
      fill.style.width = ((e - s) / 10) + '%';
      Plotly.relayout(gd, {'xaxis.range': [startTs, endTs]});
    }

    startSlider.addEventListener('input', function() {
      if (parseInt(startSlider.value) > parseInt(endSlider.value)) {
        startSlider.value = endSlider.value;
      }
      updateRange();
    });
    endSlider.addEventListener('input', function() {
      if (parseInt(endSlider.value) < parseInt(startSlider.value)) {
        endSlider.value = startSlider.value;
      }
      updateRange();
    });
